<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chitra — every string in your Figma file, accounted for</title>
    <meta
      name="description"
      content="Chitra is a Figma plugin. It lists every text layer in your file in one panel, tracks each string through review, and hands the words to engineering as one JSON file."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='3' y='3' width='58' height='58' rx='10' fill='%23201F1A'/%3E%3Crect x='9' y='9' width='46' height='46' rx='6' fill='none' stroke='%23D4A93C' stroke-width='2' stroke-dasharray='4 4'/%3E%3Ctext x='32' y='45' font-size='32' text-anchor='middle' fill='%23F7F2E8' font-family='Tiro Devanagari Hindi,Kohinoor Devanagari,serif'%3E%E0%A4%9A%3C/text%3E%3C/svg%3E"
    />
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('chitra-theme')
          if (t === 'light' || t === 'dark') {
            document.documentElement.setAttribute('data-theme', t)
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.setAttribute('data-theme', 'dark')
          }
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Tiro+Devanagari+Hindi&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
